server {
    # ${PORT} is substituted at container start by the nginx image's
    # envsubst-on-templates entrypoint (filter is set to ^PORT$ so nginx's
    # own variables below stay literal). Default of 80 is set in the
    # Dockerfile for local docker-compose; Railway injects its own PORT.
    listen ${PORT};
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Docker's embedded DNS — used so the proxy_pass variable below is
    # resolved at request time (not nginx startup). Lets the container
    # start even when the upstream host doesn't exist (Railway split
    # services), where the SPA bundle calls VITE_API_URL directly and
    # this location is never hit.
    resolver 127.0.0.11 valid=10s ipv6=off;

    location / {
        try_files $uri $uri/ /index.html;
    }

    # Runtime config — never cache. Generated fresh each container start
    # from the API_URL env var, so caching it would pin the bundle to a
    # stale URL across deploys.
    location = /config.js {
        add_header Cache-Control "no-store, no-cache, must-revalidate" always;
        expires off;
    }

    # Local dev / docker-compose convenience: proxy /api to the api service
    # on the same Docker network. On Railway split deployments the SPA bundle
    # calls VITE_API_URL directly so this block is unused.
    location /api {
        set $api_upstream "http://api:3000";
        proxy_pass $api_upstream;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
    }

    location ~* \.(?:css|js|svg|png|jpg|jpeg|gif|ico|woff2?)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}
